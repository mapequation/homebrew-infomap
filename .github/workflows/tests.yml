name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - name: Resolve bottle root URL
        if: github.event_name == 'pull_request'
        run: |
          version="$(ruby -e 'content = File.read("Formula/infomap.rb"); match = content.match(%r{refs/tags/v([^"/]+)\.tar\.gz}); abort("version not found") unless match; puts match[1]')"
          echo "ROOT_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/infomap-${version}" >> "$GITHUB_ENV"

      - run: brew test-bot --only-formulae --root-url="${ROOT_URL}"
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.os }}
          path: '*.bottle.*'
